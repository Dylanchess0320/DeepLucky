<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DeepLucky · Sharp AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#070b0f; --surface:#0c1117; --panel:#11161f; --border:#1e2a32;
      --accent:#10b981; --accent2:#0d9f6e; --user-bg:#0a2a2a; --ai-bg:#0f141c;
      --text:#e2edf7; --muted:#5b6e8c; --danger:#f9735c;
      --mono:'DM Mono', monospace; --sans:'Syne', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; }
    #header { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center;}
    #header-left { display: flex; gap: 10px; align-items: center; }
    .logo-dot { width: 10px; height: 10px; background: var(--accent); transform: rotate(45deg); }
    h1 { font-family: var(--sans); font-size: 16px; font-weight: 800; letter-spacing: -0.02em; text-transform: uppercase; color: #fff; }
    h1 span { color: var(--accent); }
    .controls { display: flex; gap: 8px; }
    button.header-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 6px 14px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
    button.header-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
    #chat { flex: 1; overflow-y: auto; padding: 20px 18px; scroll-behavior: smooth; }
    .message { display: flex; gap: 12px; margin-bottom: 24px; animation: fadeIn .2s; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user .avatar { background: var(--accent2); color: #000; }
    .ai .avatar { background: var(--panel); border: 1px solid var(--border); color: var(--accent); }
    .bubble-wrap { max-width: min(85%, 700px); }
    .user .bubble-wrap { text-align: right; }
    .bubble { padding: 12px 18px; border-radius: 18px; line-height: 1.6; background: var(--ai-bg); border: 1px solid var(--border); display: inline-block; text-align: left; word-break: break-word; }
    .user .bubble { background: var(--user-bg); border-color: #1d4d4d; border-bottom-right-radius: 4px; }
    .ai .bubble { border-bottom-left-radius: 4px; width: 100%; }
    .bubble pre { background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 13px; }
    .bubble code { font-family: var(--mono); font-size: 13px; background: rgba(255,255,255,0.05); padding: 2px 4px; border-radius: 4px; }
    .bubble p { margin-bottom: 8px; }
    .bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 8px; }
    .typing-indicator { display: flex; gap: 5px; padding: 6px 0; }
    .typing-indicator span { width: 6px; height: 6px; background: var(--accent); animation: blink 1s infinite; border-radius: 50%; }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
    #empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); text-align: center; }
    #empty-state .big-dot { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    #empty-state .big-dot::after { content: '✨'; font-size: 20px; }
    #input-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
    #input-row { display: flex; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 8px 12px; align-items: flex-end; }
    #message-input { flex: 1; background: none; border: none; color: var(--text); font-family: var(--sans); font-size: 15px; resize: none; outline: none; max-height: 120px; padding: 4px 0; }
    #send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color:#000; font-weight: bold; flex-shrink: 0; margin-bottom: 2px;}
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #char-count { font-size: 11px; color: var(--muted); text-align: right; padding-top: 8px; }
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1e2a32; border: 1px solid var(--border); color: #eef4ff; font-size: 12px; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: .2s; pointer-events: none; z-index: 100; white-space: nowrap; }
    #toast.show { opacity: 1; }
    @keyframes fadeIn { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left"><div class="logo-dot"></div><h1>Deep<span>Lucky</span></h1></div>
    <div class="controls">
      <button id="search-btn" class="header-btn">Web Search: OFF</button>
      <button id="clear-btn" class="header-btn">Clear</button>
    </div>
  </div>
  <div id="chat"><div id="empty-state"><div class="big-dot"></div><p>sharp answers · expert coding · zero clutter</p></div></div>
  <div id="input-area">
    <div id="input-row">
      <textarea id="message-input" placeholder="Ask DeepLucky..." rows="1" maxlength="4000"></textarea>
      <button id="send-btn" title="Send">➤</button>
    </div>
    <div id="char-count">0 / 4000</div>
  </div>
</div>
<div id="toast"></div>

<script>
  // ==================== DEEPLUCKY – NO CORS, NO PROXY ====================
  const API_KEY = 'sk-d4e0841cffca4470adebf12df3613423'; // your key – check if valid
  let messages = [], streaming = false, useWebSearch = false;
  let currentStreamingId = null; // track the placeholder to exclude it from API

  const chatEl = document.getElementById('chat'), inputEl = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn'), clearBtn = document.getElementById('clear-btn');
  const searchBtn = document.getElementById('search-btn'), charCount = document.getElementById('char-count');
  const emptyState = document.getElementById('empty-state'), toastEl = document.getElementById('toast');

  marked.setOptions({
    highlight: function(code, lang) {
      const language = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, { language }).value;
    }
  });

  searchBtn.onclick = () => {
    useWebSearch = !useWebSearch;
    searchBtn.textContent = `Web Search: ${useWebSearch ? 'ON' : 'OFF'}`;
    searchBtn.classList.toggle('active', useWebSearch);
    toast(useWebSearch ? '🌍 Web Search Enabled' : '🚫 Web Search Disabled');
  };

  function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag])); }

  function renderMessage(msg) {
    const w = document.createElement('div');
    w.className = `message ${msg.role}`; w.dataset.id = msg.id;
    const contentHtml = msg.role === 'user' 
        ? escapeHTML(msg.content).replace(/\n/g, '<br>') 
        : (msg.content ? marked.parse(msg.content) : '<div class="typing-indicator"><span></span><span></span><span></span></div>');
    w.innerHTML = `<div class="avatar">${msg.role === 'user' ? 'U' : 'L'}</div><div class="bubble-wrap"><div class="bubble">${contentHtml}</div></div>`;
    return w;
  }

  function updateStreamingMessage(id, fullText) {
    const w = chatEl.querySelector(`.message[data-id="${id}"]`);
    if (!w) return;
    const b = w.querySelector('.bubble');
    b.innerHTML = fullText.trim() ? marked.parse(fullText) : '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function save() { try { localStorage.setItem('dl_messages', JSON.stringify(messages.slice(-50))); } catch(e) {} }
  function load() {
    try {
      const s = JSON.parse(localStorage.getItem('dl_messages') || '[]');
      if (s.length) {
        messages = s; emptyState.style.display = 'none';
        messages.forEach(m => chatEl.appendChild(renderMessage(m)));
        setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 100);
      }
    } catch(e) { messages = []; }
  }

  function autoResize() { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'; }
  function updateCharCount() { charCount.textContent = `${inputEl.value.length}/4000`; }
  function toast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); setTimeout(() => toastEl.classList.remove('show'), 2500); }
  function setStreamState(state) { streaming = state; sendBtn.disabled = state; inputEl.disabled = state; }

  async function performWebSearch(query) {
    try {
      const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&utf8=&format=json&origin=*`);
      const data = await res.json();
      if (data.query?.search?.length) {
        const top = data.query.search.slice(0, 2).map(r => r.snippet.replace(/<[^>]+>/g, '')).join(" ");
        return `\n\n[Web Search Context]: ${top}`;
      }
    } catch (e) { console.warn('Search failed:', e); }
    return '';
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    if (emptyState.style.display !== 'none') { emptyState.style.display = 'none'; chatEl.innerHTML = ''; }

    // Add user message to UI and store
    const userMsg = { role: 'user', content: text, id: Date.now() };
    messages.push(userMsg);
    chatEl.appendChild(renderMessage(userMsg));
    inputEl.value = ''; autoResize(); updateCharCount(); chatEl.scrollTop = chatEl.scrollHeight;

    // Create placeholder AI message
    const aiId = Date.now() + 1;
    const aiMsg = { role: 'assistant', content: '', id: aiId };
    messages.push(aiMsg);
    currentStreamingId = aiId; // mark this as the one we're streaming
    chatEl.appendChild(renderMessage(aiMsg));
    setStreamState(true);

    try {
      // Build conversation history for API – exclude the streaming placeholder (last message if it's the same)
      let history = messages.filter(m => m.id !== currentStreamingId && m.content !== undefined && m.content !== null);
      // Only take last 20 messages (excluding system)
      let conv = history.slice(-20).map(m => ({ role: m.role, content: m.content }));

      // Add search context to the latest user message
      let searchContext = '';
      if (useWebSearch) {
        toast('🔍 Searching web...');
        searchContext = await performWebSearch(text);
      }
      if (searchContext && conv.length > 0 && conv[conv.length - 1].role === 'user') {
        conv[conv.length - 1].content += searchContext;
      }

      const systemPrompt = "You are DeepLucky, an elite software engineer and AI assistant. Provide sharp, concise answers. If asked to code, output high-quality, efficient code using markdown blocks with the correct language tag. Be direct. Do not use reasoning tags.";

      const apiMessages = [{ role: 'system', content: systemPrompt }, ...conv];

      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'deepseek-reasoner', messages: apiMessages, stream: true, temperature: 0.5 })
      });

      if (!res.ok) {
        const errorText = await res.text();
        throw new Error(`${res.status} ${errorText.slice(0, 200)}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let acc = '';
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ') && !line.includes('[DONE]')) {
            try {
              const parsed = JSON.parse(line.slice(6));
              const content = parsed.choices?.[0]?.delta?.content || '';
              if (content) {
                acc += content;
                aiMsg.content = acc;
                updateStreamingMessage(aiId, acc);
              }
            } catch (e) {}
          }
        }
      }
      if (!acc.trim()) { aiMsg.content = '⚡ No response.'; updateStreamingMessage(aiId, aiMsg.content); }
    } catch (err) {
      console.error(err);
      let msg = `❌ Error: ${err.message}`;
      if (err.message.includes('Failed to fetch')) msg = '❌ Network error – check internet connection.';
      aiMsg.content = msg; updateStreamingMessage(aiId, msg);
    }

    setStreamState(false);
    currentStreamingId = null;
    save();
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function clearChat() { messages = []; chatEl.innerHTML = ''; chatEl.appendChild(emptyState); emptyState.style.display = ''; localStorage.removeItem('dl_messages'); toast('🧹 Cleared'); }
  sendBtn.onclick = sendMessage; clearBtn.onclick = clearChat;
  inputEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey && !streaming && inputEl.value.trim()) { e.preventDefault(); sendMessage(); } };
  inputEl.oninput = () => { autoResize(); updateCharCount(); };
  load(); updateCharCount();
</script>
</body>
</html>
